<!doctype html>
<html lang="th">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Redirecting...</title></head>
<body>
<script>
(function(){
  var parts = location.pathname.split('/').filter(Boolean);
  var base = location.origin + (parts.length ? '/' + parts[0] + '/' : '/');
  var search = location.search || '';
  var hash = location.hash || '';
  // Preserve Supabase auth query/hash, but move back to the app root so GitHub Pages does not stay on 404.
  if (/access_token=|refresh_token=|token_hash=|type=recovery|type=invite|error_description=|code=/.test(search + hash)) {
    if (!/[?&]mode=/.test(search) && /type=recovery|type=invite|access_token=|code=/.test(search + hash)) {
      search = (search ? search + '&' : '?') + 'mode=recovery';
    }
  }
  location.replace(base + search + hash);
})();
</script>
